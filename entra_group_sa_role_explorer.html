
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.layout{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px 0}
.col-head{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:4px}
.card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary);overflow:hidden}
.app-item{padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary);transition:background .15s}
.app-item:last-child{border-bottom:none}
.app-item:hover{background:var(--color-background-tertiary)}
.app-item.active{background:#EEEDFE;border-left:3px solid #534AB7}
.app-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.app-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.token-box{padding:14px;background:var(--color-background-secondary)}
.token-field{margin-bottom:10px}
.field-label{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.field-val{font-size:12px;font-family:var(--font-mono);background:var(--color-background-tertiary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:6px 8px;color:var(--color-text-primary);line-height:1.5}
.group-pill{display:inline-block;font-size:11px;font-family:var(--font-mono);background:#EEEDFE;color:#3C3489;border-radius:4px;padding:2px 7px;margin:2px 3px 2px 0;border:0.5px solid #AFA9EC}
.sa-row{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sa-row:last-child{border-bottom:none}
.sa-name{font-size:12px;font-family:var(--font-mono);font-weight:500;color:var(--color-text-primary)}
.sa-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.role-pill{display:inline-block;font-size:10px;background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5;border-radius:4px;padding:2px 6px;margin:2px 3px 2px 0;font-family:var(--font-mono)}
.role-pill.deny{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.empty-state{padding:24px 12px;text-align:center;font-size:12px;color:var(--color-text-tertiary)}
.badge{font-size:10px;background:#EEEDFE;color:#3C3489;border-radius:10px;padding:1px 7px;margin-left:6px;vertical-align:middle}
.no-access{padding:12px;font-size:12px;color:var(--color-text-tertiary);font-style:italic}
.sep{height:0.5px;background:var(--color-border-tertiary);margin:0 12px}
.col{display:flex;flex-direction:column;gap:0}
</style>

<div style="padding:16px 0 4px">
  <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:4px">Click any app to see its OIDC token claims and what GCP access it gets — and why.</div>
</div>

<div class="layout">
  <div>
    <div class="col-head">On-prem applications</div>
    <div class="card" id="app-list"></div>
  </div>
  <div>
    <div class="col-head">OIDC token claims</div>
    <div class="card" id="token-panel"><div class="empty-state">Select an app</div></div>
  </div>
  <div>
    <div class="col-head">GCP access granted</div>
    <div class="card" id="gcp-panel"><div class="empty-state">Select an app</div></div>
  </div>
</div>

<div style="padding:8px 0 4px">
  <div style="font-size:11px;color:var(--color-text-tertiary)">
    GCP evaluates <span style="font-family:var(--font-mono);background:var(--color-background-tertiary);padding:1px 5px;border-radius:4px">attribute.groups</span> from the token against IAM bindings — no per-app config needed in GCP.
  </div>
</div>

<script>
const GROUPS = {
  'grp-bq-read':   { name:'gcp-bigquery-readers',    oid:'aaa-bbb-111' },
  'grp-gcs-write': { name:'gcp-gcs-writers',          oid:'aaa-bbb-222' },
  'grp-pubsub':    { name:'gcp-pubsub-publishers',    oid:'aaa-bbb-333' },
  'grp-secret':    { name:'gcp-secret-readers',       oid:'aaa-bbb-444' },
  'grp-spanner':   { name:'gcp-spanner-readers',      oid:'aaa-bbb-555' },
};

const SAS = {
  'grp-bq-read':   { sa:'sa-bq-reader@proj.iam.gserviceaccount.com',    roles:['roles/bigquery.dataViewer','roles/bigquery.jobUser'],      svc:'BigQuery' },
  'grp-gcs-write': { sa:'sa-gcs-writer@proj.iam.gserviceaccount.com',   roles:['roles/storage.objectCreator'],                            svc:'Cloud Storage' },
  'grp-pubsub':    { sa:'sa-pubsub-pub@proj.iam.gserviceaccount.com',   roles:['roles/pubsub.publisher'],                                 svc:'Pub/Sub' },
  'grp-secret':    { sa:'sa-secret-reader@proj.iam.gserviceaccount.com',roles:['roles/secretmanager.secretAccessor'],                     svc:'Secret Manager' },
  'grp-spanner':   { sa:'sa-spanner-r@proj.iam.gserviceaccount.com',    roles:['roles/spanner.databaseReader'],                          svc:'Spanner' },
};

const APPS = [
  { name:'Order Service',      team:'payments',  appid:'app-001', groups:['grp-bq-read','grp-pubsub'],           desc:'Reads analytics, publishes events' },
  { name:'Inventory API',      team:'logistics', appid:'app-002', groups:['grp-bq-read','grp-gcs-write'],        desc:'Reads stock data, writes reports' },
  { name:'Auth Gateway',       team:'platform',  appid:'app-003', groups:['grp-secret'],                         desc:'Reads creds from Secret Manager' },
  { name:'Report Generator',   team:'finance',   appid:'app-004', groups:['grp-bq-read','grp-gcs-write','grp-spanner'], desc:'Full read + export pipeline' },
  { name:'Notification Worker',team:'comms',     appid:'app-005', groups:['grp-pubsub','grp-secret'],            desc:'Publishes alerts, reads API keys' },
  { name:'Legacy Batch Job',   team:'ops',       appid:'app-006', groups:[],                                     desc:'No GCP access — not in any group' },
];

let selected = null;

function render() {
  const list = document.getElementById('app-list');
  list.innerHTML = APPS.map((a,i) => `
    <div class="app-item${selected===i?' active':''}" onclick="select(${i})">
      <div class="app-name">${a.name} <span class="badge">${a.groups.length} group${a.groups.length!==1?'s':''}</span></div>
      <div class="app-sub">${a.team} · ${a.desc}</div>
    </div>`).join('');

  if (selected === null) return;
  const app = APPS[selected];

  const tokenPanel = document.getElementById('token-panel');
  const groupsHtml = app.groups.length
    ? app.groups.map(g => `<span class="group-pill">${GROUPS[g].name}</span>`).join('')
    : '<span style="color:var(--color-text-tertiary);font-size:12px;font-style:italic">— no groups assigned —</span>';

  tokenPanel.innerHTML = `
    <div class="token-box">
      <div class="token-field">
        <div class="field-label">iss (issuer)</div>
        <div class="field-val">https://login.microsoftonline.com/&lt;tenant&gt;/v2.0</div>
      </div>
      <div class="token-field">
        <div class="field-label">sub (subject — unique app identity)</div>
        <div class="field-val">${app.appid}-sub-${app.team}</div>
      </div>
      <div class="token-field">
        <div class="field-label">appid (Entra app registration ID)</div>
        <div class="field-val">${app.appid}</div>
      </div>
      <div class="token-field">
        <div class="field-label">aud (audience — must match WIF provider)</div>
        <div class="field-val">api://gcp-wif-prod</div>
      </div>
      <div class="token-field">
        <div class="field-label">groups (Entra group OIDs — this drives GCP access)</div>
        <div class="field-val" style="padding:8px">${groupsHtml}</div>
      </div>
    </div>`;

  const gcpPanel = document.getElementById('gcp-panel');
  if (!app.groups.length) {
    gcpPanel.innerHTML = `<div class="no-access">No Entra groups → no group claims in token → WIF attribute condition finds no matching IAM binding → access denied to all GCP services.</div>`;
    return;
  }

  gcpPanel.innerHTML = app.groups.map(g => {
    const sa = SAS[g];
    const grp = GROUPS[g];
    return `
      <div class="sa-row">
        <div style="font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${sa.svc}</div>
        <div class="sa-name">${sa.sa}</div>
        <div style="font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono);margin:3px 0 6px">via group: ${grp.name}</div>
        <div>${sa.roles.map(r=>`<span class="role-pill">${r}</span>`).join('')}</div>
      </div>`;
  }).join('<div class="sep"></div>');
}

function select(i) {
  selected = i;
  render();
}

render();
</script>
